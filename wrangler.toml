name = "course-hub-cf"
main = "backend/src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm --prefix backend ci && npm --prefix frontend ci && npm --prefix frontend run build"

[assets]
directory = "./frontend/dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "course-hub-db"
database_id = "your-database-id"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "course-materials"

[vars]
APP_ENV = "production"
ALLOWED_ORIGINS = "http://localhost:3000"
JWT_ISSUER = "course-hub"
JWT_AUDIENCE = "course-hub-users"
MATERIAL_MAX_SIZE_MB = "10240"